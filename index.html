<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics Workspace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-[#F4F6F3] text-[#1F2933]">
    <!-- HEADER -->
    <header
      class="flex justify-between items-center px-6 py-4 bg-white border-b border-gray-200 shadow-sm"
    >
      <h1 class="text-2xl font-semibold flex items-center gap-2">
        <i data-lucide="bar-chart-3" class="w-6 h-6 text-[#2F3E34]"></i>
        Analytics Workspace
      </h1>

      <button
        class="flex items-center gap-2 bg-[#2F3E34] text-white px-4 py-2 rounded-lg hover:bg-[#25332b] transition"
      >
        <i data-lucide="download" class="w-4 h-4"></i>
        Export
      </button>
    </header>

    <!-- MAIN -->
    <main class="grid md:grid-cols-4 gap-6 p-6">
      <!-- SIDEBAR -->
      <aside
        class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm space-y-4"
      >
        <h2 class="text-lg font-semibold flex items-center gap-2">
          <i data-lucide="filter" class="w-5 h-5 text-[#2F3E34]"></i>
          Filters
        </h2>

        <form class="space-y-4">
          <div class="relative">
            <label class="block text-sm mb-1 text-gray-500">Date Range</label>
            <i
              data-lucide="calendar"
              class="absolute left-3 top-9 w-4 h-4 text-gray-400"
            ></i>
            <select
              class="w-full pl-10 border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#2F3E34]"
            >
              <option>Last 7 days</option>
              <option>Last 30 days</option>
              <option>Last 90 days</option>
            </select>
          </div>

          <div class="relative">
            <label class="block text-sm mb-1 text-gray-500">Channel</label>
            <i
              data-lucide="layers"
              class="absolute left-3 top-9 w-4 h-4 text-gray-400"
            ></i>
            <select
              class="w-full pl-10 border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#2F3E34]"
            >
              <option>All channels</option>
              <option>Organic</option>
              <option>Paid</option>
            </select>
          </div>
        </form>
      </aside>

      <!-- CONTENT -->
      <div class="md:col-span-3 space-y-6">
        <!-- METRICS -->
        <section>
          <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
            <i data-lucide="activity" class="w-5 h-5 text-[#2F3E34]"></i>
            Key Metrics
          </h2>

          <div class="grid md:grid-cols-3 gap-4">
            <article
              class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm"
            >
              <div class="flex items-center gap-2 mb-1 text-gray-500 text-sm">
                <i data-lucide="users" class="w-4 h-4"></i>
                Visitors
              </div>
              <p class="text-2xl font-semibold">42,100</p>
            </article>

            <article
              class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm"
            >
              <div class="flex items-center gap-2 mb-1 text-gray-500 text-sm">
                <i data-lucide="trending-up" class="w-4 h-4"></i>
                Conversion Rate
              </div>
              <p class="text-2xl font-semibold">3.8%</p>
            </article>

            <article
              class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm"
            >
              <div class="flex items-center gap-2 mb-1 text-gray-500 text-sm">
                <i data-lucide="arrow-down-circle" class="w-4 h-4"></i>
                Bounce Rate
              </div>
              <p class="text-2xl font-semibold">28%</p>
            </article>
          </div>
        </section>

        <!-- TABLE -->
        <section
          class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm"
        >
          <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
            <i data-lucide="file-text" class="w-5 h-5 text-[#2F3E34]"></i>
            Top Pages
          </h2>

          <table class="w-full text-left">
            <thead>
              <tr class="text-sm text-gray-500 border-b">
                <th class="pb-2">Page</th>
                <th class="pb-2">Views</th>
                <th class="pb-2">Conversion</th>
              </tr>
            </thead>

            <tbody class="text-sm">
              <tr class="border-b hover:bg-gray-50">
                <td class="py-3">Homepage</td>
                <td>18,400</td>
                <td class="text-[#2F3E34] font-medium">4.2%</td>
              </tr>

              <tr class="border-b hover:bg-gray-50">
                <td class="py-3">Pricing</td>
                <td>8,120</td>
                <td class="text-[#2F3E34] font-medium">6.1%</td>
              </tr>

              <tr class="hover:bg-gray-50">
                <td class="py-3">Blog</td>
                <td>5,900</td>
                <td class="text-[#2F3E34] font-medium">1.9%</td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
